    function showToast(msg, type = '') {
      if (toastTimer) clearTimeout(toastTimer);
      toast.textContent = msg; toast.className = `toast ${type}`;
      requestAnimationFrame(() => { toast.classList.add('show'); toastTimer = setTimeout(() => toast.classList.remove('show'), 2000); });
    }
    function formatTime(m) { if (m < 60) return `${m} мин`; const h = Math.floor(m/60), min = m%60; return min ? `${h} ч ${min} мин` : `${h} ч`; }
    function deg2rad(deg) { return deg * (Math.PI/180); }
    function getDistanceFromLatLonInKm(lat1,lon1,lat2,lon2) { const R=6371,dLat=deg2rad(lat2-lat1),dLon=deg2rad(lon2-lon1),a=Math.sin(dLat/2)**2+Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
    function formatDistance(km) { return km<1 ? `${Math.round(km*1000)} м` : `${km.toFixed(1)} км`; }

    function isAdult(dateString) {
      if (!dateString) return false;
      const birth = new Date(dateString);
      const today = new Date();
      let age = today.getFullYear() - birth.getFullYear();
      const m = today.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
      return age >= 18;
    }

    function openProfileModal() {
      document.getElementById('profileNameInput').value=userProfile.name;
      document.getElementById('profileBirthInput').value=userProfile.birthDate;
      updateAvatarPreview(userProfile.avatar, userProfile.name[0].toUpperCase());
      document.getElementById('galleryInput').tempDataUrl = null;
      document.getElementById('profileModal').classList.add('active');
    }
    function updateAvatarPreview(av,init){ const p=document.getElementById('avatarPreview'); p.innerHTML = av ? `<img src="${av}">` : init; }
    function handleFile(file){ if(!file) return; const reader=new FileReader(); reader.onload=e=>{ const img=new Image(); img.onload=()=>{ const c=document.createElement('canvas'), max=200; let w=img.width,h=img.height; if(w>h){ if(w>max){ h*=max/w; w=max; } } else { if(h>max){ w*=max/h; h=max; } } c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); const dataUrl=c.toDataURL('image/jpeg',0.7); document.getElementById('galleryInput').tempDataUrl = dataUrl; updateAvatarPreview(dataUrl,''); }; img.src=e.target.result; }; reader.readAsDataURL(file); }
    async function saveProfile(){
      const name=document.getElementById('profileNameInput').value.trim();
      const birthDate=document.getElementById('profileBirthInput').value;
      if(!name) return showToast('Имя не может быть пустым');
      if(birthDate && !isAdult(birthDate)) return showToast('Возраст должен быть не менее 18 лет');
      let av=userProfile.avatar; const temp=document.getElementById('galleryInput').tempDataUrl; if(temp) av=temp;
      userProfile.name=name; userProfile.avatar=av; userProfile.birthDate=birthDate;
      await db.collection('users').doc(currentUser.uid).set({
        name, avatar:av, birthDate, updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      },{merge:true});
      if(isFree) await db.collection('people').doc(currentUser.uid).update({
        name, avatar:av, init:name[0].toUpperCase(), updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      document.getElementById('userAvatar').innerHTML=av?`<img src="${av}">`:name[0].toUpperCase();
      document.getElementById('profileBtn').innerHTML=av?`<img src="${av}">`:name[0].toUpperCase();
      document.querySelector('.status-name').textContent=name;
      document.getElementById('profileModal').classList.remove('active'); showToast('Профиль обновлён','success');
    }

    async function openFriendsModal() {
      const list=document.getElementById('friendsList'), hist=document.getElementById('chatHistoryList');
      list.innerHTML=''; hist.innerHTML='';
      try {
        const friendsSnap = await db.collection('friends').doc(currentUser.uid).get();
        const friends = friendsSnap.exists ? (friendsSnap.data().list||[]) : [];
        if(friends.length===0){ list.innerHTML='<div style="color:var(--text-tertiary);text-align:center;padding:20px">Нет друзей</div>'; }
        else {
          for(const fid of friends) {
            const userDoc=await db.collection('users').doc(fid).get();
            if(!userDoc.exists) continue;
            const u=userDoc.data();
            const row=document.createElement('div'); row.className='friend-row';
            row.innerHTML=`<div class="person-avatar" style="width:40px;height:40px;font-size:16px">${u.avatar?`<img src="${u.avatar}">`:(u.name||'?')[0].toUpperCase()}</div><span>${u.name||'Пользователь'}</span>`;
            row.onclick=()=>{ document.getElementById('friendsModal').classList.remove('active'); openChat(fid,u.name||'?',u.avatar||'',(u.name||'?')[0].toUpperCase()); };
            list.appendChild(row);
          }
        }
        const chatsSnap = await db.collection('chats').where('participants','array-contains',currentUser.uid).orderBy('updatedAt','desc').limit(20).get();
        chatsSnap.forEach(doc=>{
          const data=doc.data(); const peerId=data.participants.find(p=>p!==currentUser.uid); if(!peerId) return;
          db.collection('users').doc(peerId).get().then(peerDoc=>{
            const peerName = peerDoc.exists ? (peerDoc.data().name||'Пользователь') : 'Пользователь';
            const div=document.createElement('div'); div.className='friend-row'; div.style.justifyContent='space-between';
            div.innerHTML=`<span>${data.lastMessage||'...'}</span><span style="font-size:11px;color:var(--text-tertiary)">${peerName}</span>`;
            div.onclick=()=>{ document.getElementById('friendsModal').classList.remove('active'); openChat(peerId, peerName, peerDoc.data().avatar||'', (peerName[0]||'?').toUpperCase()); };
            hist.appendChild(div);
          });
        });
        document.getElementById('friendsModal').classList.add('active');
      } catch (e) { showToast('Не удалось загрузить друзей'); }
    }

    async function addFriendByEmail() {
      const email=document.getElementById('friendEmailInput').value.trim().toLowerCase(); if(!email) return;
      try {
        const emailDoc = await db.collection('emails').doc(email).get();
        if (!emailDoc.exists) return showToast('Пользователь не найден');
        const friendId = emailDoc.data().uid;
        if (friendId === currentUser.uid) return showToast('Нельзя добавить себя');
        const ref = db.collection('friends').doc(currentUser.uid);
        await db.runTransaction(async t => {
          const doc = await t.get(ref);
          let list = doc.exists ? (doc.data().list || []) : [];
          if (!list.includes(friendId)) { list.push(friendId); t.set(ref, { list }, { merge: true }); }
        });
        const friendRef = db.collection('friends').doc(friendId);
        await db.runTransaction(async t => {
          const doc = await t.get(friendRef);
          let list = doc.exists ? (doc.data().list || []) : [];
          if (!list.includes(currentUser.uid)) { list.push(currentUser.uid); t.set(friendRef, { list }, { merge: true }); }
        });
        showToast('Друг добавлен', 'success');
        openFriendsModal();
      } catch (e) { showToast('Ошибка при добавлении друга'); }
    }

    function openChat(peerId,peerName,peerAvatar,peerInit){
      if (activeChatPeerId) closeChatModal();
      activeChatPeerId=peerId; document.getElementById('chatName').textContent=peerName||'Пользователь';
      const av=document.getElementById('chatAvatar'); av.innerHTML=peerAvatar?`<img src="${peerAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:peerInit||'?';
      document.getElementById('chatMessages').innerHTML=''; document.getElementById('chatModal').classList.add('active'); loadChatMessages();
    }
    function closeChatModal(){ document.getElementById('chatModal').classList.remove('active'); if(unsubscribeChat){unsubscribeChat();unsubscribeChat=null;} activeChatPeerId=null; }
    function getChatId(a,b){ return [a,b].sort().join('_'); }
    function loadChatMessages(){
      if(!activeChatPeerId) return; const chatId=getChatId(currentUser.uid,activeChatPeerId);
      if(unsubscribeChat) unsubscribeChat();
      unsubscribeChat = db.collection('chats').doc(chatId).collection('messages').orderBy('timestamp','asc').onSnapshot(snap=>{
        const cont=document.getElementById('chatMessages'); cont.innerHTML='';
        snap.forEach(d=>{ const msg=d.data(); const div=document.createElement('div'); div.className=`message ${msg.from===currentUser.uid?'mine':'theirs'}`; div.textContent=msg.text; cont.appendChild(div); });
        cont.scrollTop=cont.scrollHeight;
      });
    }
    async function sendMessage(){
      const input=document.getElementById('chatInput'), text=input.value.trim(); if(!text||!activeChatPeerId) return;
      input.value=''; const chatId=getChatId(currentUser.uid,activeChatPeerId), ref=db.collection('chats').doc(chatId);
      const doc=await ref.get();
      if(!doc.exists) await ref.set({participants:[currentUser.uid,activeChatPeerId],lastMessage:text,lastMessageTime:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      else await ref.update({lastMessage:text,lastMessageTime:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      await ref.collection('messages').add({from:currentUser.uid,text,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
    }

    function plural(n){ const m=n%10,h=n%100; if(m===1&&h!==11) return 'человек'; if([2,3,4].includes(m)&&![12,13,14].includes(h)) return 'человека'; return 'человек'; }

    setInterval(()=>{
      if(!currentUser) return;
      db.collection('people').where('online','==',true).get().then(snap=>{
        const batch=db.batch();
        snap.forEach(d=>{
          const data=d.data();
          if (data.time > 0) {
            const newTime = data.time - 1;
            if (newTime <= 0) batch.update(d.ref, { time: newTime, online: false });
            else batch.update(d.ref, { time: newTime });
          }
        });
        batch.commit().catch(()=>{});
      }).catch(()=>{});
    },60000);

    if(localStorage.getItem('theme')==='dark') document.body.classList.add('theme-dark');

    auth.onAuthStateChanged(user => user ? renderApp(user) : renderAuth());
  })();
</script>
</body>
