      4.2. Администрация принимает технические и организационные меры для защиты данных от несанкционированного доступа, изменения, раскрытия или уничтожения.<br>
      4.3. Данные хранятся до момента удаления аккаунта Пользователем, после чего уничтожаются в течение 30 календарных дней.<br><br>
      <b>5. Передача третьим лицам</b><br>

      5.2. В иных случаях персональные данные не распространяются и не предоставляются третьим лицам без согласия Пользователя.<br><br>
      <b>6. Геолокация</b><br>
      6.1. Геопозиция запрашивается только при активации режима «доступен» и используется для отображения приблизительного расстояния до других пользователей.<br>

      <b>7. Права Пользователя</b><br>

    function showToast(msg, type = '') {
      if (toastTimer) clearTimeout(toastTimer);
      toast.textContent = msg; toast.className = `toast ${type}`;
      requestAnimationFrame(() => { toast.classList.add('show'); toastTimer = setTimeout(() => toast.classList.remove('show'), 2000); });
    }
    function formatTime(m) { if (m < 60) return `${m} мин`; const h = Math.floor(m/60), min = m%60; return min ? `${h} ч ${min} мин` : `${h} ч`; }
    function deg2rad(deg) { return deg * (Math.PI/180); }
    function getDistanceFromLatLonInKm(lat1,lon1,lat2,lon2) { const R=6371,dLat=deg2rad(lat2-lat1),dLon=deg2rad(lon2-lon1),a=Math.sin(dLat/2)**2+Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
    function formatDistance(km) { return km<1 ? `${Math.round(km*1000)} м` : `${km.toFixed(1)} км`; }

    function isAdult(dateString) {
      if (!dateString) return false;
      const birth = new Date(dateString);
      const today = new Date();
      let age = today.getFullYear() - birth.getFullYear();
      const m = today.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
      return age >= 18;
    }

      };
      return errors[code] || 'Ошибка';

        userProfile.birthDate = d.birthDate || '';
        isFree = d.isFree || false;
        currentMood = d.mood || 'coffee';
      } else {

        userProfile.avatar = ''; userProfile.birthDate = '';
        await db.collection('users').doc(uid).set({
          name: userProfile.name, avatar: '', isFree: false, mood: 'coffee',
          email: user.email, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

          const friendsSnap = await db.collection('friends').doc(uid).get();
          const friendIds = friendsSnap.exists ? (friendsSnap.data().list || []) : [];
          friendsListCache = friendIds;
          let userIds = [];
          
          const emailSnap = await db.collection('emails').where(firebase.firestore.FieldPath.documentId(), '>=', query).where(firebase.firestore.FieldPath.documentId(), '<=', query + '\uf8ff').limit(20).get();
          emailSnap.forEach(d => { if (d.data().uid !== uid) userIds.push(d.data().uid); });
          
          const nameSnap = await db.collection('users').where('name', '>=', query).where('name', '<=', query + '\uf8ff').limit(20).get();
          nameSnap.forEach(d => { if (d.id !== uid && !userIds.includes(d.id)) userIds.push(d.id); });
          
          listEl.innerHTML = '';
          if (userIds.length === 0) { listEl.innerHTML = '<div style="color:var(--text-tertiary);text-align:center;padding:10px">Никого не найдено</div>'; return; }
          
          const userDocs = await Promise.all(userIds.slice(0, 20).map(id => db.collection('users').doc(id).get()));
          userDocs.forEach(doc => {
            if (!doc.exists) return;
            const u = doc.data();
            const isFriend = friendIds.includes(doc.id);
            const row = document.createElement('div'); row.className = 'friend-row';
            row.innerHTML = `<div class="person-avatar" style="width:40px;height:40px;font-size:16px">${u.avatar?`<img src="${u.avatar}">`:(u.name||'?')[0].toUpperCase()}</div><span style="flex:1">${u.name||'Пользователь'}<br><span style="font-size:11px;color:var(--text-tertiary)">${u.email||''}</span></span>${isFriend?'<span style="font-size:11px;color:var(--accent-green)">друг</span>':'<button class="add-friend-btn" data-uid="'+doc.id+'">Добавить</button>'}`;
            listEl.appendChild(row);
          });
          
          listEl.querySelectorAll('.add-friend-btn').forEach(btn => {
            btn.onclick = async function() {
              const fid = this.dataset.uid;
              this.disabled = true;
              this.textContent = '...';
              await db.collection('friends').doc(uid).set({ list: firebase.firestore.FieldValue.arrayUnion(fid) }, { merge: true });
              await db.collection('friends').doc(fid).set({ list: firebase.firestore.FieldValue.arrayUnion(uid) }, { merge: true });
              friendsListCache.push(fid);
              this.textContent = 'друг';
              this.className = '';
              this.style.color = 'var(--accent-green)';
              this.style.fontSize = '11px';
              showToast('Друг добавлен', 'success');
            };
          });
        } catch(e) { listEl.innerHTML = '<div style="color:var(--accent-red)">Ошибка поиска</div>'; }
      }, 400));

      // Legal links
      const legalModal = document.getElementById('legalModal');
      const legalContent = document.getElementById('legalContent');
      document.getElementById('profileTermsLink').onclick = () => { legalContent.innerHTML = termsText; legalModal.classList.add('active'); };
      document.getElementById('profilePrivacyLink').onclick = () => { legalContent.innerHTML = privacyText; legalModal.classList.add('active'); };
      document.getElementById('closeLegalBtn').onclick = () => legalModal.classList.remove('active');
      legalModal.onclick = (e) => { if (e.target === legalModal) legalModal.classList.remove('active'); };
    }

    // Helper functions
    function openProfileModal() {
      document.getElementById('profileNameInput').value = userProfile.name;
      document.getElementById('profileBirthInput').value = userProfile.birthDate;
      updateAvatarPreview(userProfile.avatar, userProfile.name[0].toUpperCase());
      document.getElementById('galleryInput').tempDataUrl = null;
      document.getElementById('profileModal').classList.add('active');
    }
    function updateAvatarPreview(av, init) { document.getElementById('avatarPreview').innerHTML = av ? `<img src="${av}">` : init; }
    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas'), max = 200;
          let w = img.width, h = img.height;
          if (w > h) { if (w > max) { h *= max / w; w = max; } }
          else { if (h > max) { w *= max / h; h = max; } }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          document.getElementById('galleryInput').tempDataUrl = dataUrl;
          updateAvatarPreview(dataUrl, '');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
    async function saveProfile() {
      const name = document.getElementById('profileNameInput').value.trim();
      const birth = document.getElementById('profileBirthInput').value;
      if (!name) return showToast('Имя не может быть пустым');
      if (birth && !isAdult(birth)) return showToast('Возраст должен быть не менее 18 лет');
      let av = userProfile.avatar;
      const temp = document.getElementById('galleryInput').tempDataUrl;
      if (temp) av = temp;
      userProfile.name = name; userProfile.avatar = av; userProfile.birthDate = birth;
      await db.collection('users').doc(currentUser.uid).set({
        name, avatar: av, birthDate: birth, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      if (isFree) await db.collection('people').doc(currentUser.uid).update({
        name, avatar: av, init: name[0].toUpperCase(), updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      document.getElementById('userAvatar').innerHTML = av ? `<img src="${av}">` : name[0].toUpperCase();
      document.getElementById('profileBtn').innerHTML = av ? `<img src="${av}">` : name[0].toUpperCase();
      document.querySelector('.status-name').textContent = name;
      document.getElementById('profileModal').classList.remove('active');
      showToast('Профиль обновлён', 'success');
    }

    async function loadFriendsTab() {
      const list = document.getElementById('friendsList'), hist = document.getElementById('chatHistoryList');
      list.innerHTML = '<div class="spinner"></div>'; hist.innerHTML = '';
      try {
        const fs = await db.collection('friends').doc(currentUser.uid).get();
        friendsListCache = fs.exists ? (fs.data().list || []) : [];
        list.innerHTML = '';
        if (friendsListCache.length === 0) {
          list.innerHTML = '<div style="color:var(--text-tertiary);text-align:center;padding:20px">Нет друзей</div>';
        } else {
          const batches = []; for (let i = 0; i < friendsListCache.length; i += 10) batches.push(friendsListCache.slice(i, i + 10));
          const results = await Promise.all(batches.map(b => db.collection('users').where(firebase.firestore.FieldPath.documentId(), 'in', b).get()));
          const userMap = {}; results.forEach(snap => snap.forEach(doc => userMap[doc.id] = doc.data()));
          friendsListCache.forEach(fid => {
            const u = userMap[fid]; if (!u) return;
            const row = document.createElement('div'); row.className = 'friend-row';
            row.innerHTML = `<div class="person-avatar" style="width:40px;height:40px;font-size:16px">${u.avatar ? `<img src="${u.avatar}">` : (u.name || '?')[0].toUpperCase()}</div><span>${u.name || 'Пользователь'}</span>`;
            row.onclick = () => { document.getElementById('friendsModal').classList.remove('active'); openChat(fid, u.name || '?', u.avatar || '', (u.name || '?')[0].toUpperCase()); };
            list.appendChild(row);
          });
        }
        const chatsSnap = await db.collection('chats').where('participants', 'array-contains', currentUser.uid).orderBy('updatedAt', 'desc').limit(20).get(); hist.innerHTML = '';
        chatsSnap.forEach(doc => {
          const data = doc.data(); const peerId = data.participants.find(p => p !== currentUser.uid); if (!peerId) return;
          db.collection('users').doc(peerId).get().then(peerDoc => {
            const peerName = peerDoc.exists ? (peerDoc.data().name || 'Пользователь') : 'Пользователь';
            const div = document.createElement('div'); div.className = 'friend-row'; div.style.justifyContent = 'space-between';
            div.innerHTML = `<span>${data.lastMessage || '...'}</span><span style="font-size:11px;color:var(--text-tertiary)">${peerName}</span>`;
            div.onclick = () => { document.getElementById('friendsModal').classList.remove('active'); openChat(peerId, peerName, peerDoc.data().avatar || '', (peerName[0] || '?').toUpperCase()); };
            hist.appendChild(div);
          });
        });
      } catch (e) { showToast('Не удалось загрузить друзей'); }
    }

    async function addFriendByEmail() {
      const email = document.getElementById('friendEmailInput').value.trim().toLowerCase(); if (!email) return;
      const emailDoc = await db.collection('emails').doc(email).get();
      if (!emailDoc.exists) return showToast('Пользователь не найден');
      const friendId = emailDoc.data().uid;
      if (friendId === currentUser.uid) return showToast('Нельзя добавить себя');
      await db.collection('friends').doc(currentUser.uid).set({
        list: firebase.firestore.FieldValue.arrayUnion(friendId)
      }, { merge: true });
      await db.collection('friends').doc(friendId).set({
        list: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
      }, { merge: true });
      friendsListCache.push(friendId);
      showToast('Друг добавлен', 'success');
      loadFriendsTab();
    }

    function openChat(peerId, peerName, peerAvatar, peerInit) {
      if (activeChatPeerId) closeChatModal();
      activeChatPeerId = peerId;
      document.getElementById('chatName').textContent = peerName || 'Пользователь';
      const av = document.getElementById('chatAvatar');
      av.innerHTML = peerAvatar ? `<img src="${peerAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : (peerInit || '?');
      document.getElementById('chatMessages').innerHTML = '';
      document.getElementById('chatModal').classList.add('active');
      loadChatMessages();
    }
    function closeChatModal() {
      document.getElementById('chatModal').classList.remove('active');
      if (unsubscribeChat) { unsubscribeChat(); unsubscribeChat = null; }
      activeChatPeerId = null;
    }
    function getChatId(a, b) { return [a, b].sort().join('_'); }
    function loadChatMessages() {
      if (!activeChatPeerId) return;
      const chatId = getChatId(currentUser.uid, activeChatPeerId);
      if (unsubscribeChat) unsubscribeChat();
      unsubscribeChat = db.collection('chats').doc(chatId).collection('messages').orderBy('timestamp', 'asc').onSnapshot(snap => {
        const cont = document.getElementById('chatMessages'); cont.innerHTML = '';
        snap.forEach(d => {
          const msg = d.data();
          const div = document.createElement('div');
          div.className = `message ${msg.from === currentUser.uid ? 'mine' : 'theirs'}`;
          div.textContent = msg.text;
          cont.appendChild(div);
        });
        cont.scrollTop = cont.scrollHeight;
      });
    }
    async function sendMessage() {
      const input = document.getElementById('chatInput'), text = input.value.trim();
      if (!text || !activeChatPeerId) return;
      input.value = '';
      const chatId = getChatId(currentUser.uid, activeChatPeerId);
      const ref = db.collection('chats').doc(chatId);
      await ref.set({
        participants: [currentUser.uid, activeChatPeerId],
        lastMessage: text,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      await ref.collection('messages').add({
        from: currentUser.uid,
        text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    function debounce(fn, delay) {
      let timer;
      return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), delay); };
    }

    // Timer for countdown
    setInterval(() => {
      if (!currentUser) return;
      db.collection('people').where('online', '==', true).get().then(snap => {
        const batch = db.batch();
        snap.forEach(d => {
          const data = d.data();
          if (data.time > 0) {
            const newTime = data.time - 1;
            if (newTime <= 0) batch.update(d.ref, { time: newTime, online: false });
            else batch.update(d.ref, { time: newTime });
          }
        });
        batch.commit().catch(() => {});
      });
    }, 60000);

    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('theme-dark');

    auth.onAuthStateChanged(user => user ? renderApp(user) : renderAuth());
  })();
</script>
