            --surface: #FFFFFF;
            --text: #0D0D0D;
            --text-secondary: #6E6E73;
            --text-tertiary: #AEAEB2;
            --accent: #0066FF;
            --accent-green: #1ED45E;

            --shadow-button: 0 2px 8px rgba(0, 102, 255, 0.15);
            --shadow-button-green: 0 2px 8px rgba(30, 212, 94, 0.2);

            --radius-lg: 24px;
            --radius-xl: 30px;

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;

            width: 100%;
            overflow: hidden;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);

            align-items: center;
            justify-content: center;

            height: 100%;

            max-height: 932px;

            flex-direction: column;
            position: relative;
            overflow: hidden;

            overflow-x: hidden;
            padding: 20px 22px;

            flex-direction: column;
            gap: 20px;
        }

        .screen::-webkit-scrollbar {

        .center {
            text-align: center;
            padding: 60px 0 20px;

        .logo {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text);

        .subtitle {

            };

            function showToast(msg, type = '') {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = `toast ${type}`;
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
                });
            }

            function formatTime(m) {
                if (m < 60) return `${m} мин`;
                const h = Math.floor(m / 60);
                const min = m % 60;
                return min > 0 ? `${h} ч ${min} мин` : `${h} ч`;
            }

            function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
                const R = 6371;
                const dLat = deg2rad(lat2 - lat1);
                const dLon = deg2rad(lon2 - lon1);
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                    Math.sin(dLon / 2) * Math.sin(dLon / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            }

            function deg2rad(deg) {
                return deg * (Math.PI / 180);
            }

            function formatDistance(km) {
                if (km < 1) return `${Math.round(km * 1000)} м`;
                return `${km.toFixed(1)} км`;
            }

                    auth.signInWithEmailAndPassword(email, pass).catch(e => authError.textContent =

                });

                document.getElementById('registerBtn').addEventListener('click', () => {
                    const email = document.getElementById('emailInput').value.trim();
                    const pass = document.getElementById('passwordInput').value;
                    const authError = document.getElementById('authError');
                    if (!email || !pass) return authError.textContent = 'Заполните все поля';
                    if (pass.length < 6) return authError.textContent = 'Пароль минимум 6 символов';
                    auth.createUserWithEmailAndPassword(email, pass)
                        .then(() => showToast('Аккаунт создан!', 'success'))
                        .catch(e => authError.textContent = getErrorMessage(e.code));
                });

                document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') document.getElementById('loginBtn').click();
                });
            }

            function getErrorMessage(code) {
                const errors = {
                    'auth/invalid-email': 'Неверный формат email',
                    'auth/user-not-found': 'Пользователь не найден',
                    'auth/wrong-password': 'Неверный пароль',
                    'auth/email-already-in-use': 'Email уже используется',
                    'auth/weak-password': 'Пароль слишком простой',
                    'auth/invalid-credential': 'Неверный email или пароль'
                };
                return errors[code] || 'Ошибка. Попробуйте снова';
            }

            // ============ ОСНОВНОЙ ЭКРАН ============
            function renderApp(user) {
                currentUser = user;
                const uid = user.uid;

                // Загружаем профиль
                db.collection('users').doc(uid).get().then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        userProfile.name = data.name || user.email.split('@')[0];
                        userProfile.avatar = data.avatar || '';
                        isFree = data.isFree || false;
                        currentMood = data.mood || 'coffee';
                    } else {
                        userProfile.name = user.email.split('@')[0];
                        userProfile.avatar = '';
                        db.collection('users').doc(uid).set({
                            name: userProfile.name,
                            avatar: '',
                            isFree: false,
                            mood: 'coffee',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                    updateUIAfterProfileLoad();
                });

                function updateUIAfterProfileLoad() {
                    const userName = userProfile.name;
                    const userInitial = userName[0].toUpperCase();
                    const avatarHTML = userProfile.avatar ?
                        `<img src="${userProfile.avatar}" alt="avatar">` : userInitial;

                    root.innerHTML = `
                        <div class="screen" id="mainScreen">
                            <div class="header">
                                <div>
                                    <span class="logo-sm">сейчас<span class="logo-dot"></span></span>
                                </div>
                                <div class="header-pill" id="radiusPill">радиус 2 км</div>
                                <div class="profile-btn" id="profileBtn">${avatarHTML}</div>
                            </div>

                            <div class="status-card" id="statusCard">
                                <div class="status-row">
                                    <div class="user-avatar" id="userAvatar">${avatarHTML}</div>
                                    <div class="status-info">
                                        <div class="status-name">${userName}</div>
                                        <div class="status-subtitle" id="statusText">Не в сети</div>
                                    </div>
                                    <div class="status-indicator" id="statusDot"></div>
                                </div>
                                <button class="btn" id="freeBtn">
                                    <span id="freeBtnText">Стать доступным</span>
                                </button>
                            </div>

                            <div class="quick-actions">
                                <div class="quick-action" id="qaNearby">Рядом</div>
                                <div class="quick-action" id="qaFriends">Друзья</div>
                                <div class="quick-action" id="qaParty">Вечеринки</div>
                            </div>

                            <div class="section-label">Настроение</div>
                            <div class="mood-scroll" id="moodChips">
                                ${Object.entries(moodNames).map(([k, v]) => 
                                    `<div class="mood-chip" data-mood="${k}">${v}</div>`
                                ).join('')}
                            </div>

                            <div class="people-header">
                                <span class="people-title">Рядом</span>
                                <span class="people-count" id="peopleCount">0 человек</span>
                            </div>
                            <div class="people-list" id="peopleList"></div>
                            <div class="empty-state" id="emptyState" style="display:none">
                                <div class="empty-circle">—</div>
                                <div class="empty-title">Никого поблизости</div>
                                <div class="empty-desc">Смените настроение или расширьте радиус</div>
                            </div>
                        </div>
                        <div class="bottom-bar">
                            <span>Чаты живут 24 часа</span>
                            <span class="logout-btn" id="logoutBtn">Выйти</span>
                        </div>
                        <!-- Модалка профиля -->
                        <div class="modal-overlay" id="profileModal">
                            <div class="modal-sheet">
                                <div class="modal-handle"></div>
                                <div class="section-label">Редактировать профиль</div>
                                <div class="input" style="margin-top:8px">
                                    <input class="input" id="profileNameInput" type="text" placeholder="Ваше имя" value="${userProfile.name}" style="width:100%">
                                </div>
                                <div class="avatar-upload">
                                    <div class="avatar-preview" id="avatarPreview">${avatarHTML}</div>
                                    <label class="btn outline" style="flex:1; margin:0; cursor:pointer;">
                                        <input type="file" id="avatarFileInput" accept="image/*" capture="environment" style="display:none">
                                        📷 Сменить фото
                                    </label>
                                </div>
                                <button class="btn" id="saveProfileBtn">Сохранить</button>
                                <button class="btn outline" id="closeProfileBtn">Отмена</button>
                            </div>
                        </div>
                        <!-- Модалка чата -->
                        <div class="modal-overlay" id="chatModal">
                            <div class="modal-sheet">
                                <div class="modal-handle"></div>
                                <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px">
                                    <div class="person-avatar" id="chatAvatar" style="width:40px;height:40px;font-size:16px"></div>
                                    <div>
                                        <div class="status-name" id="chatName"></div>
                                        <div style="font-size:12px; color:var(--text-tertiary)">Диалог</div>
                                    </div>
                                </div>
                                <div class="chat-messages" id="chatMessages"></div>
                                <div class="chat-input-row">
                                    <input class="chat-input" id="chatInput" type="text" placeholder="Сообщение...">
                                    <button class="send-btn" id="sendBtn">➤</button>
                                </div>
                                <button class="btn outline" id="closeChatBtn" style="margin-top:8px">Закрыть</button>
                            </div>
                        </div>
                    `;

                    // Инициализация UI
                    updateStatusUI();
                    updateMoodUI();
                    loadPeople();
                    setupMainListeners(uid, userName, userInitial);
                }

                function updateStatusUI() {
                    const statusCard = document.getElementById('statusCard');
                    const statusDot = document.getElementById('statusDot');
                    const statusText = document.getElementById('statusText');
                    const freeBtn = document.getElementById('freeBtn');
                    const freeBtnText = document.getElementById('freeBtnText');
                    if (!statusCard) return;

                    if (isFree) {
                        statusCard.classList.add('live');
                        statusDot.classList.add('live');
                        statusText.textContent = 'Доступен · виден друзьям';
                        freeBtnText.textContent = 'Завершить';
                        freeBtn.classList.add('green');
                    } else {
                        statusCard.classList.remove('live');
                        statusDot.classList.remove('live');
                        statusText.textContent = 'Не в сети';
                        freeBtnText.textContent = 'Стать доступным';
                        freeBtn.classList.remove('green');
                    }
                }

                function updateMoodUI() {
                    document.querySelectorAll('.mood-chip').forEach(chip => {
                        chip.classList.toggle('selected', chip.dataset.mood === currentMood);
                    });
                }

                function loadPeople() {
                    db.collection('people')
                        .where('mood', '==', currentMood)
                        .where('online', '==', true)
                        .onSnapshot(snapshot => {
                            const peopleList = document.getElementById('peopleList');
                            const emptyState = document.getElementById('emptyState');
                            const peopleCount = document.getElementById('peopleCount');
                            peopleList.innerHTML = '';

                            const people = [];
                            snapshot.forEach(doc => {
                                if (doc.id !== currentUser.uid) {
                                    people.push({ id: doc.id, ...doc.data() });
                                }
                            });

                            // Фильтр по радиусу, если есть координаты
                            const filtered = people.filter(p => {
                                if (!currentCoords || !p.lat || !p.lon) return true;
                                const dist = getDistanceFromLatLonInKm(
                                    currentCoords.lat, currentCoords.lon, p.lat, p.lon
                                );
                                return dist <= 2; // 2 км
                            });

                            if (filtered.length === 0) {
                                emptyState.style.display = 'flex';
                                peopleCount.textContent = '0 человек';
                            } else {
                                emptyState.style.display = 'none';
                                peopleCount.textContent = `${filtered.length} ${plural(filtered.length)}`;

                                filtered.forEach((p, i) => {
                                    const urgent = p.time < 15;
                                    const distText = (currentCoords && p.lat && p.lon) ?
                                        formatDistance(getDistanceFromLatLonInKm(
                                            currentCoords.lat, currentCoords.lon, p.lat, p.lon
                                        )) : 'рядом';
                                    const avatarContent = p.avatar ?
                                        `<img src="${p.avatar}" alt="avatar">` : p.init;

                                    const card = document.createElement('div');
                                    card.className = `person-card${urgent ? ' urgent' : ''}`;
                                    card.style.animationDelay = `${i * 0.05}s`;
                                    card.innerHTML = `
                                        <div class="person-avatar">${avatarContent}<span class="online-dot"></span></div>
                                        <div class="person-info">
                                            <div class="person-name-row">
                                                <span class="person-name">${p.name}</span>
                                                <span class="person-tag ${p.rel === 'friend' ? 'friend' : 'mutual'}">
                                                    ${p.rel === 'friend' ? 'друг' : 'общий'}
                                                </span>
                                            </div>
                                            <div class="person-mood">${moodNames[p.mood]}</div>
                                            <div class="person-distance">${distText}</div>
                                        </div>
                                        <div class="person-timer">
                                            <span class="timer-value${urgent ? ' critical' : ''}">${formatTime(p.time)}</span>
                                            <span class="chat-hint">Написать</span>
                                        </div>
                                    `;
                                    card.addEventListener('click', () => openChat(p.id, p.name, p.avatar || '', p.init));
                                    peopleList.appendChild(card);
                                });
                            }
                        });
                }

                function setupMainListeners(uid, userName, userInitial) {
                    document.getElementById('freeBtn').addEventListener('click', async () => {
                        isFree = !isFree;
                        updateStatusUI();

                        const updates = {
                            isFree,
                            mood: currentMood,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        await db.collection('users').doc(uid).set(updates, { merge: true });

                        if (isFree) {
                            // Запрашиваем геопозицию
                            let lat = null,
                                lon = null;
                            try {
                                const pos = await new Promise((resolve, reject) => {
                                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                                        enableHighAccuracy: true,
                                        timeout: 10000
                                    });
                                });
                                lat = pos.coords.latitude;
                                lon = pos.coords.longitude;
                                currentCoords = { lat, lon };
                            } catch (e) {
                                console.warn('Геолокация недоступна:', e);
                                showToast('Гео недоступна, вы всё равно в эфире');
                                currentCoords = null;
                            }

                            const peopleData = {
                                name: userProfile.name,
                                init: userInitial,
                                avatar: userProfile.avatar || '',
                                mood: currentMood,
                                rel: 'friend',
                                time: 1440,
                                online: true,
                                dist: 'здесь',
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                            };
                            if (lat !== null && lon !== null) {
                                peopleData.lat = lat;
                                peopleData.lon = lon;
                            }
                            await db.collection('people').doc(uid).set(peopleData);
                            showToast('Вы в эфире!', 'success');
                        } else {
                            await db.collection('people').doc(uid).delete().catch(() => {});
                            currentCoords = null;
                            showToast('Вы не в сети');
                        }
                    });

                    document.getElementById('moodChips').addEventListener('click', (e) => {
                        const chip = e.target.closest('.mood-chip');
                        if (!chip) return;
                        currentMood = chip.dataset.mood;
                        updateMoodUI();
                        db.collection('users').doc(uid).set({
                            mood: currentMood,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                        if (isFree) {
                            db.collection('people').doc(uid).update({
                                mood: currentMood,
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }
                    });

                    document.getElementById('qaNearby').addEventListener('click', () => showToast('Поиск поблизости'));
                    document.getElementById('qaFriends').addEventListener('click', () => showToast('Только друзья'));
                    document.getElementById('qaParty').addEventListener('click', () => showToast('Вечеринки (скоро)'));
                    document.getElementById('radiusPill').addEventListener('click', () => showToast('Радиус поиска: 2 км'));

                    document.getElementById('logoutBtn').addEventListener('click', async () => {
                        if (isFree) await db.collection('people').doc(uid).delete().catch(() => {});
                        auth.signOut();
                    });

                    // Профиль
                    document.getElementById('profileBtn').addEventListener('click', openProfileModal);
                    document.getElementById('closeProfileBtn').addEventListener('click', closeProfileModal);
                    document.getElementById('saveProfileBtn').addEventListener('click', saveProfile);
                    document.getElementById('avatarFileInput').addEventListener('change', handleAvatarSelect);
                    document.getElementById('profileModal').addEventListener('click', function(e) {
                        if (e.target === this) closeProfileModal();
                    });

                    // Чат
                    document.getElementById('closeChatBtn').addEventListener('click', closeChatModal);
                    document.getElementById('chatModal').addEventListener('click', function(e) {
                        if (e.target === this) closeChatModal();
                    });
                    document.getElementById('sendBtn').addEventListener('click', sendMessage);
                    document.getElementById('chatInput').addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') sendMessage();
                    });
                }

                function openProfileModal() {
                    document.getElementById('profileNameInput').value = userProfile.name;
                    updateAvatarPreview(userProfile.avatar, userProfile.name[0].toUpperCase());
                    document.getElementById('profileModal').classList.add('active');
                }

                function closeProfileModal() {
                    document.getElementById('profileModal').classList.remove('active');
                }

                function updateAvatarPreview(avatar, initial) {
                    const preview = document.getElementById('avatarPreview');
                    if (avatar) {
                        preview.innerHTML = `<img src="${avatar}" alt="preview">`;
                    } else {
                        preview.innerHTML = initial;
                    }
                }

                function handleAvatarSelect(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const maxSize = 200;
                            let width = img.width;
                            let height = img.height;
                            if (width > height) {
                                if (width > maxSize) {
                                    height *= maxSize / width;
                                    width = maxSize;
                                }
                            } else {
                                if (height > maxSize) {
                                    width *= maxSize / height;
                                    height = maxSize;
                                }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            // Временно сохраняем в data-атрибут для сохранения
                            document.getElementById('avatarFileInput').tempDataUrl = dataUrl;
                            updateAvatarPreview(dataUrl, '');
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }

                async function saveProfile() {
                    const newName = document.getElementById('profileNameInput').value.trim();
                    if (!newName) return showToast('Имя не может быть пустым');
                    let newAvatar = userProfile.avatar;
                    const tempDataUrl = document.getElementById('avatarFileInput').tempDataUrl;
                    if (tempDataUrl) newAvatar = tempDataUrl;

                    userProfile.name = newName;
                    userProfile.avatar = newAvatar;

                    await db.collection('users').doc(uid).set({
                        name: newName,
                        avatar: newAvatar,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });

                    if (isFree) {
                        await db.collection('people').doc(uid).update({
                            name: newName,
                            avatar: newAvatar,
                            init: newName[0].toUpperCase(),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }

                    // Обновить UI
                    document.getElementById('userAvatar').innerHTML = newAvatar ?
                        `<img src="${newAvatar}" alt="avatar">` : newName[0].toUpperCase();
                    document.getElementById('profileBtn').innerHTML = newAvatar ?
                        `<img src="${newAvatar}" alt="avatar">` : newName[0].toUpperCase();
                    document.querySelector('.status-name').textContent = newName;
                    closeProfileModal();
                    showToast('Профиль обновлён', 'success');
                }

                // ========== ЧАТ ==========
                let activeChatPeerId = null;
                let unsubscribeChat = null;

                function openChat(peerId, peerName, peerAvatar, peerInit) {
                    activeChatPeerId = peerId;
                    document.getElementById('chatName').textContent = peerName;
                    const avatarEl = document.getElementById('chatAvatar');
                    if (peerAvatar) {
                        avatarEl.innerHTML = `<img src="${peerAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                    } else {
                        avatarEl.innerHTML = peerInit;
                    }
                    document.getElementById('chatMessages').innerHTML = '';
                    document.getElementById('chatModal').classList.add('active');
                    loadChatMessages();
                }

                function closeChatModal() {
                    document.getElementById('chatModal').classList.remove('active');
                    if (unsubscribeChat) {
                        unsubscribeChat();
                        unsubscribeChat = null;
                    }
                    activeChatPeerId = null;
                }

                function getChatId(uid1, uid2) {
                    return [uid1, uid2].sort().join('_');
                }

                async function loadChatMessages() {
                    if (!activeChatPeerId || !currentUser) return;
                    const chatId = getChatId(currentUser.uid, activeChatPeerId);
                    const messagesRef = db.collection('chats').doc(chatId).collection('messages').orderBy('timestamp',
                        'asc');
                    if (unsubscribeChat) unsubscribeChat();
                    unsubscribeChat = messagesRef.onSnapshot(snapshot => {
                        const container = document.getElementById('chatMessages');
                        container.innerHTML = '';
                        snapshot.forEach(doc => {
                            const msg = doc.data();
                            const div = document.createElement('div');
                            div.className = `message ${msg.from === currentUser.uid ? 'mine' : 'theirs'}`;
                            div.textContent = msg.text;
                            container.appendChild(div);
                        });
                        container.scrollTop = container.scrollHeight;
                    });
                }

                async function sendMessage() {
                    const input = document.getElementById('chatInput');
                    const text = input.value.trim();
                    if (!text || !activeChatPeerId || !currentUser) return;
                    input.value = '';
                    const chatId = getChatId(currentUser.uid, activeChatPeerId);
                    const chatRef = db.collection('chats').doc(chatId);
                    // Убедимся, что документ чата существует
                    const doc = await chatRef.get();
                    if (!doc.exists) {
                        await chatRef.set({
                            participants: [currentUser.uid, activeChatPeerId],
                            lastMessage: text,
                            lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } else {
                        await chatRef.update({
                            lastMessage: text,
                            lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                    await chatRef.collection('messages').add({
                        from: currentUser.uid,
                        text,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                function plural(n) {
                    const m = n % 10;
                    const h = n % 100;
                    if (m === 1 && h !== 11) return 'человек';
                    if ([2, 3, 4].includes(m) && ![12, 13, 14].includes(h)) return 'человека';
                    return 'человек';
                }
            }

            // ============ ГЛОБАЛЬНЫЙ СЛУШАТЕЛЬ АУТЕНТИФИКАЦИИ ============
            auth.onAuthStateChanged(user => {
                if (user) {
                    renderApp(user);
                } else {
                    renderAuth();
                }
            });

            // ============ ТАЙМЕР ОБНОВЛЕНИЯ ВРЕМЕНИ (каждую минуту) ============
            setInterval(() => {
                if (!currentUser) return;
                db.collection('people')
                    .where('online', '==', true)
                    .get()
                    .then(snapshot => {
                        const batch = db.batch();
                        let hasUpdates = false;
                        snapshot.forEach(doc => {
                            const data = doc.data();
                            if (data.time > 0) {
                                batch.update(doc.ref, { time: data.time - 1 });
                                hasUpdates = true;
                            }
                            if (data.time <= 1) {
                                batch.update(doc.ref, { online: false });
                                hasUpdates = true;
                            }
                        });
                        if (hasUpdates) batch.commit().catch(() => {});
                    }).catch(() => {});
            }, 60000);

            console.log('Приложение "сейчас" запущено');
        })();
    </script>
</body>
</html>
