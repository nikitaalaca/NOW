<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>сейчас — анти-соцсеть</title>
  <style>
    :root {
      --bg:#FAFAFA; --surface:#FFF; --text:#0D0D0D; --text2:#6E6E73; --text3:#AEAEB2;
      --accent:#0066FF; --green:#1ED45E; --red:#FF3B30;
      --shadow:0 1px 3px rgba(0,0,0,0.02),0 4px 12px rgba(0,0,0,0.03);
      --r:18px; --r2:24px; --r3:30px; --rf:999px;
      --font:-apple-system,'SF Pro Display','Inter',sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
    html,body{height:100%;width:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center}
    .app{width:100%;height:100%;max-width:430px;max-height:932px;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden}
    @media(min-width:431px){.app{border-radius:44px;box-shadow:0 30px 80px rgba(0,0,0,0.12);height:92vh;max-height:880px}}
    
    .screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 22px;display:flex;flex-direction:column;gap:20px}
    .screen::-webkit-scrollbar{width:0}
    
    .center{text-align:center;padding:50px 0 20px}
    .logo{font-size:42px;font-weight:700;letter-spacing:-1px}
    .dot{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;margin-left:4px;vertical-align:super}
    .subtitle{font-size:14px;color:var(--text3);margin-top:8px}
    
    .card{background:var(--surface);border-radius:var(--r3);padding:24px;display:flex;flex-direction:column;gap:16px;box-shadow:var(--shadow)}
    .label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3)}
    .input{padding:14px 16px;border-radius:var(--r);border:none;background:#F5F5FA;font-size:15px;font-family:var(--font);outline:none}
    .input:focus{background:#EEEEF5}
    .btn{width:100%;padding:15px 24px;border-radius:var(--r);font-size:16px;font-weight:600;cursor:pointer;border:none;color:#fff;background:var(--accent);transition:0.2s}
    .btn:active{transform:scale(0.97)}
    .btn.green{background:var(--green)}
    .link{text-align:center;font-size:13px;color:var(--accent);cursor:pointer;margin-top:8px}
    .error{color:var(--red);font-size:13px;text-align:center}
    
    .header{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
    .logo-sm{font-size:30px;font-weight:700}
    .pill{font-size:12px;font-weight:600;padding:7px 15px;border-radius:var(--rf);background:var(--surface);color:var(--text2);box-shadow:var(--shadow);cursor:pointer}
    
    .status-card{background:var(--surface);border-radius:var(--r3);padding:22px;display:flex;flex-direction:column;gap:18px;box-shadow:var(--shadow)}
    .status-card.live{background:#F8FFFA}
    .row{display:flex;align-items:center;gap:12px}
    .avatar{width:46px;height:46px;border-radius:50%;background:#F5F5FA;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:600;color:var(--text2)}
    .info{flex:1}
    .name{font-weight:600;font-size:16px}
    .stat{font-size:12px;color:var(--text3);margin-top:2px}
    .ind{width:10px;height:10px;border-radius:50%;background:#D1D1D6}
    .ind.on{background:var(--green);box-shadow:0 0 10px rgba(30,212,94,0.4);animation:pulse 2.5s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 6px rgba(30,212,94,0.25)}50%{box-shadow:0 0 16px rgba(30,212,94,0.5)}}
    
    .chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px 0}
    .chips::-webkit-scrollbar{display:none}
    .chip{padding:10px 18px;border-radius:var(--rf);font-size:14px;font-weight:500;white-space:nowrap;background:var(--surface);cursor:pointer;color:var(--text2);box-shadow:var(--shadow)}
    .chip.sel{background:var(--text);color:#fff;font-weight:600}
    
    .list{display:flex;flex-direction:column;gap:8px}
    .person{display:flex;align-items:center;gap:14px;background:var(--surface);border-radius:var(--r2);padding:15px 17px;cursor:pointer;box-shadow:var(--shadow)}
    .person:active{transform:scale(0.98)}
    .p-avatar{width:48px;height:48px;border-radius:50%;background:#F5F5FA;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:600;color:var(--text2);position:relative}
    .online{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid #fff}
    .p-info{flex:1}
    .p-name{font-weight:600;font-size:15px}
    .p-mood{font-size:13px;color:var(--text3)}
    .tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--rf);text-transform:uppercase}
    .tag.friend{background:#EEF2FF;color:#4B6BFF}
    .tag.mutual{background:#F5F0FF;color:#8B5CF6}
    .timer{font-size:12px;font-weight:600;padding:5px 10px;border-radius:var(--rf);background:#F5F5FA}
    .timer.crit{background:#FFF0F0;color:var(--red);animation:blink 1.2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
    
    .empty{text-align:center;padding:40px;color:var(--text3)}
    .toast{position:absolute;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--text);color:#fff;padding:12px 22px;border-radius:var(--rf);font-size:13px;font-weight:600;z-index:200;pointer-events:none;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1)}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .bottom{padding:12px 22px 20px;font-size:11px;color:var(--text3);display:flex;justify-content:space-between}
    .logout{color:var(--red);cursor:pointer}
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="toast" id="toast"></div>
    <div id="root"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    // ============ ВАШИ КЛЮЧИ FIREBASE ============
    const firebaseConfig = {
      apiKey: "AIzaSyDbqMxqr3nDVmJuQx5lz4QEpbTKMjnizy0",
      authDomain: "antinet-e00ae.firebaseapp.com",
      projectId: "antinet-e00ae",
      storageBucket: "antinet-e00ae.firebasestorage.app",
      messagingSenderId: "117730505415",
      appId: "1:117730505415:web:43c174465110fda238c4e2"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ============ ПРИЛОЖЕНИЕ ============
    const $ = (s) => document.querySelector(s);
    const root = $('#root');
    const toast = $('#toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    const moods = {
      coffee:'Кофе', bar:'Бар', walk:'Прогулка', games:'Настолки', cinema:'Кино', sport:'Спорт'
    };

    function formatTime(m) {
      return m < 60 ? `${m} мин` : `${Math.floor(m/60)} ч ${m%60} мин`;
    }

    // ============ ЭКРАНЫ ============

    function renderAuth() {
      root.innerHTML = `
        <div class="screen">
          <div class="center">
            <div class="logo">сейчас<span class="dot"></span></div>
            <div class="subtitle">Встречи с друзьями в реальном времени</div>
          </div>
          <div class="card">
            <div class="label">Email</div>
            <input class="input" id="email" type="email" placeholder="your@email.com">
            <div class="label">Пароль</div>
            <input class="input" id="password" type="password" placeholder="Минимум 6 символов">
            <div id="authError" class="error"></div>
            <button class="btn" id="loginBtn">Войти</button>
            <button class="btn" id="registerBtn" style="background:transparent;color:var(--accent)">Создать аккаунт</button>
          </div>
        </div>
      `;

      $('#loginBtn').addEventListener('click', () => {
        const email = $('#email').value;
        const pass = $('#password').value;
        if (!email || !pass) {
          $('#authError').textContent = 'Заполните все поля';
          return;
        }
        auth.signInWithEmailAndPassword(email, pass)
          .then(() => showToast('Вход выполнен'))
          .catch(e => $('#authError').textContent = 'Ошибка: ' + e.message);
      });

      $('#registerBtn').addEventListener('click', () => {
        const email = $('#email').value;
        const pass = $('#password').value;
        if (!email || !pass) {
          $('#authError').textContent = 'Заполните все поля';
          return;
        }
        if (pass.length < 6) {
          $('#authError').textContent = 'Пароль минимум 6 символов';
          return;
        }
        auth.createUserWithEmailAndPassword(email, pass)
          .then(() => showToast('Аккаунт создан'))
          .catch(e => $('#authError').textContent = 'Ошибка: ' + e.message);
      });
    }

    function renderApp(user) {
      const uid = user.uid;
      
      root.innerHTML = `
        <div class="screen" id="mainScreen">
          <div class="header">
            <div class="logo-sm">сейчас<span class="dot"></span></div>
            <div class="pill" id="radiusPill">радиус 2 км</div>
          </div>
          <div class="status-card" id="statusCard">
            <div class="row">
              <div class="avatar" id="userAvatar">${user.email[0].toUpperCase()}</div>
              <div class="info">
                <div class="name">${user.email.split('@')[0]}</div>
                <div class="stat" id="statusText">Не в сети</div>
              </div>
              <div class="ind" id="statusDot"></div>
            </div>
            <button class="btn" id="freeBtn">Стать доступным</button>
          </div>
          <div class="chips" id="moodChips">
            ${Object.entries(moods).map(([k,v]) => `<div class="chip" data-mood="${k}">${v}</div>`).join('')}
          </div>
          <div class="list" id="peopleList"></div>
          <div class="empty" id="emptyState">Загрузка...</div>
        </div>
        <div class="bottom">
          <span>Чаты живут 24 часа</span>
          <span class="logout" id="logoutBtn">Выйти</span>
        </div>
      `;

      let currentMood = 'coffee';
      let isFree = false;
      
      $('#moodChips').querySelector(`[data-mood="${currentMood}"]`).classList.add('sel');

      // Загрузка состояния пользователя
      db.collection('users').doc(uid).get().then(doc => {
        if (doc.exists) {
          isFree = doc.data().isFree || false;
          currentMood = doc.data().mood || 'coffee';
          updateStatusUI();
          updateMoodUI();
        }
      });

      // Загрузка людей
      function loadPeople() {
        db.collection('people').where('mood', '==', currentMood).where('online', '==', true)
          .onSnapshot(snapshot => {
            const list = $('#peopleList');
            const empty = $('#emptyState');
            list.innerHTML = '';
            
            if (snapshot.empty) {
              empty.style.display = 'block';
              empty.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">Никого нет поблизости</div>';
              return;
            }
            
            empty.style.display = 'none';
            snapshot.forEach(doc => {
              const p = doc.data();
              if (p.id === uid) return; // Не показываем себя
              const urgent = p.time < 15;
              const div = document.createElement('div');
              div.className = 'person';
              div.innerHTML = `
                <div class="p-avatar">${p.init}<span class="online"></span></div>
                <div class="p-info">
                  <div class="p-name">${p.name} <span class="tag ${p.rel}">${p.rel==='friend'?'друг':'общий'}</span></div>
                  <div class="p-mood">${moods[p.mood]}</div>
                </div>
                <div class="timer ${urgent ? 'crit' : ''}">${formatTime(p.time)}</div>`;
              list.appendChild(div);
            });
          });
      }

      function updateStatusUI() {
        const card = $('#statusCard');
        const dot = $('#statusDot');
        const text = $('#statusText');
        const btn = $('#freeBtn');
        
        if (isFree) {
          card.classList.add('live');
          dot.classList.add('on');
          text.textContent = 'Доступен';
          btn.textContent = 'Завершить';
          btn.classList.add('green');
        } else {
          card.classList.remove('live');
          dot.classList.remove('on');
          text.textContent = 'Не в сети';
          btn.textContent = 'Стать доступным';
          btn.classList.remove('green');
        }
      }

      function updateMoodUI() {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
        const selected = document.querySelector(`[data-mood="${currentMood}"]`);
        if (selected) selected.classList.add('sel');
      }

      $('#freeBtn').addEventListener('click', () => {
        isFree = !isFree;
        updateStatusUI();
        db.collection('users').doc(uid).set({ isFree, mood: currentMood }, { merge: true });
        
        if (isFree) {
          db.collection('people').doc(uid).set({
            id: uid,
            name: user.email.split('@')[0],
            init: user.email[0].toUpperCase(),
            mood: currentMood,
            rel: 'friend',
            time: 1440,
            online: true,
            dist: 'здесь'
          });
          showToast('Вы в эфире!');
        } else {
          db.collection('people').doc(uid).delete();
          showToast('Вы не в сети');
        }
      });

      $('#moodChips').addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        currentMood = chip.dataset.mood;
        updateMoodUI();
        db.collection('users').doc(uid).set({ mood: currentMood }, { merge: true });
        if (isFree) {
          db.collection('people').doc(uid).update({ mood: currentMood });
        }
        loadPeople();
      });

      $('#radiusPill').addEventListener('click', () => showToast('Радиус поиска: 2 км'));
      $('#logoutBtn').addEventListener('click', () => auth.signOut());

      loadPeople();

      // Таймер
      setInterval(() => {
        db.collection('people').where('online', '==', true).get().then(snapshot => {
          snapshot.forEach(doc => {
            const p = doc.data();
            if (p.time > 0) {
              db.collection('people').doc(doc.id).update({ time: p.time - 1 });
            }
            if (p.time <= 1) {
              db.collection('people').doc(doc.id).update({ online: false });
            }
          });
        });
      }, 60000);
    }

    // Слушатель аутентификации
    auth.onAuthStateChanged(user => {
      if (user) {
        renderApp(user);
      } else {
        renderAuth();
      }
    });
  </script>
</body>
</html>
